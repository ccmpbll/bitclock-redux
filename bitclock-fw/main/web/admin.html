<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bitclock Admin</title>
  <style>
    :root {
      --bg: rgb(245, 242, 240);
      --fg: rgb(41, 41, 41);
      --muted: rgb(130, 120, 110);
      --line: rgb(200, 195, 190);
      --grad: linear-gradient(217deg, #4c6ef5, #22b8cf);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px 16px; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      max-width: 560px; margin-left: auto; margin-right: auto;
    }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    h2 { font-size: 1rem; margin: 0 0 12px; }
    .sub { color: var(--muted); font-size: .85rem; margin: 0 0 20px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .readings { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; }
    .reading { text-align: center; }
    .reading .val { font-size: 1.4rem; font-weight: 700; }
    .reading .lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    label { display: block; font-size: .8rem; font-weight: 600; margin: 12px 0 4px; }
    select, input[type=text], input[type=password] {
      width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
      font-size: .95rem; background: #fff; color: var(--fg);
    }
    button {
      margin-top: 16px; padding: 10px 16px; border: none; border-radius: 6px;
      background: var(--grad); color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer;
    }
    button:active { opacity: .85; }
    button.secondary { background: #fff; color: var(--fg); border: 1px solid var(--line); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row > * { flex: 1; }
    .status { font-size: .8rem; color: var(--muted); margin-top: 8px; min-height: 1em; }
    .ver { color: var(--muted); font-size: .75rem; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Bitclock</h1>
  <p class="sub">Device admin · <span id="wifi-state">—</span></p>

  <div class="card">
    <h2>Sensor readings</h2>
    <div class="readings">
      <div class="reading"><div class="val" id="r-temp">—</div><div class="lbl">Temp</div></div>
      <div class="reading"><div class="val" id="r-hum">—</div><div class="lbl">Humidity</div></div>
      <div class="reading"><div class="val" id="r-co2">—</div><div class="lbl">CO₂ ppm</div></div>
      <div class="reading"><div class="val" id="r-voc">—</div><div class="lbl">VOC</div></div>
      <div class="reading"><div class="val" id="r-nox">—</div><div class="lbl">NOₓ</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Display</h2>
    <label for="app">App</label>
    <select id="app">
      <option value="1">Clock</option>
      <option value="2">Weather</option>
    </select>
    <label for="clk">Clock format</label>
    <select id="clk">
      <option value="1">12 hour</option>
      <option value="2">24 hour</option>
    </select>
    <label for="unit">Temperature unit</label>
    <select id="unit">
      <option value="1">Celsius</option>
      <option value="2">Fahrenheit</option>
    </select>
    <label for="tz">Timezone</label>
    <select id="tz"></select>
    <button onclick="saveSettings()">Save settings</button>
    <div class="status" id="settings-status"></div>
  </div>

  <div class="card">
    <h2>Weather location</h2>
    <p class="sub" style="margin-bottom:4px">US only — uses the National Weather Service. Enter coordinates and look up.</p>
    <div class="row">
      <div><label for="lat">Latitude</label><input type="text" id="lat" placeholder="37.77"></div>
      <div><label for="lon">Longitude</label><input type="text" id="lon" placeholder="-122.42"></div>
    </div>
    <button class="secondary" onclick="lookupWeather()">Look up</button>
    <button onclick="saveWeather()">Save location</button>
    <input type="hidden" id="weather">
    <div class="status" id="weather-status"></div>
  </div>

  <div class="card">
    <h2>Wi-Fi</h2>
    <label for="ssid">SSID</label>
    <input type="text" id="ssid">
    <label for="pw">Password</label>
    <input type="password" id="pw">
    <button onclick="saveWifi()">Update Wi-Fi</button>
    <div class="status" id="wifi-status">Saving new credentials reboots the device.</div>
  </div>

  <div class="card">
    <h2>Firmware update</h2>
    <input type="file" id="fw" accept=".bin">
    <button onclick="uploadFirmware()">Upload &amp; flash</button>
    <div class="status" id="ota-status"></div>
  </div>

  <p class="ver">Firmware <span id="ver">—</span></p>

  <script>
    const $ = (id) => document.getElementById(id);
    const setText = (id, v) => { $(id).textContent = v; };

    async function fetchStatus() {
      try {
        const r = await fetch('/api/status');
        if (!r.ok) return null;
        return await r.json();
      } catch (e) { return null; }
    }

    async function loadTimezones(selected) {
      const sel = $('tz');
      try {
        const tz = await (await fetch('/api/timezones')).json();
        sel.innerHTML = '';
        for (const [label, posix] of tz) {
          const o = document.createElement('option');
          o.value = posix; o.textContent = label;
          if (posix === selected) o.selected = true;
          sel.appendChild(o);
        }
      } catch (e) { /* leave empty on failure */ }
    }

    // Live readings only — safe to run on every poll without disturbing edits.
    function updateReadings(s) {
      const unit = s.temp_unit === 2 ? 'F' : 'C';
      const t = s.temp_unit === 2 ? s.temp_f : s.temp_c;
      setText('r-temp', `${Math.round(t)}°${unit}`);
      setText('r-hum', `${Math.round(s.humidity)}%`);
      setText('r-co2', s.co2);
      setText('r-voc', s.voc);
      setText('r-nox', s.nox);
      setText('wifi-state', s.wifi_connected ? 'Connected' : 'Disconnected');
      setText('ver', s.fw_version);
    }

    // Settings → form controls. Runs once on load so polling never clobbers
    // a value the user is in the middle of changing.
    async function initSettings(s) {
      $('app').value = s.app_selection;
      $('clk').value = s.clock_format;
      $('unit').value = s.temp_unit;
      $('weather').value = s.weather_path || '';
      if (s.weather_path) setText('weather-status', `Current: ${s.weather_path}`);
      await loadTimezones(s.timezone);
    }

    async function post(url, body) {
      try {
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
        return r.ok;
      } catch (e) { return false; }
    }

    async function saveSettings() {
      setText('settings-status', 'Saving…');
      const body = new URLSearchParams({
        app_selection: $('app').value,
        clock_format: $('clk').value,
        temp_unit: $('unit').value,
        timezone: $('tz').value,
      });
      setText('settings-status', await post('/api/settings', body) ? 'Saved.' : 'Failed.');
    }

    async function lookupWeather() {
      const lat = $('lat').value.trim(), lon = $('lon').value.trim();
      if (!lat || !lon) { setText('weather-status', 'Enter latitude and longitude.'); return; }
      setText('weather-status', 'Looking up…');
      try {
        const d = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
        const path = new URL(d.properties.forecast).pathname;
        $('weather').value = path;
        const loc = d.properties.relativeLocation && d.properties.relativeLocation.properties;
        setText('weather-status', loc ? `Found ${loc.city}, ${loc.state} — click Save location` : `Found ${path} — click Save`);
      } catch (e) {
        setText('weather-status', 'No NWS location for those coordinates (US only).');
      }
    }

    async function saveWeather() {
      const path = $('weather').value;
      if (!path) { setText('weather-status', 'Look up a location first.'); return; }
      setText('weather-status', 'Saving…');
      const ok = await post('/api/settings', new URLSearchParams({ weather_path: path }));
      setText('weather-status', ok ? 'Saved.' : 'Failed.');
    }

    async function saveWifi() {
      setText('wifi-status', 'Saving… device will reboot.');
      const body = new URLSearchParams({ ssid: $('ssid').value, password: $('pw').value });
      await post('/api/wifi', body);
    }

    async function uploadFirmware() {
      const f = $('fw').files[0];
      if (!f) { setText('ota-status', 'Select a .bin file first.'); return; }
      setText('ota-status', `Uploading ${(f.size/1024).toFixed(0)} KB…`);
      try {
        const r = await fetch('/api/ota', { method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: f });
        setText('ota-status', r.ok ? 'Flashed. Rebooting…' : 'Update failed.');
      } catch (e) { setText('ota-status', 'Update failed.'); }
    }

    (async () => {
      const s = await fetchStatus();
      if (s) { updateReadings(s); await initSettings(s); }
      setInterval(async () => { const s = await fetchStatus(); if (s) updateReadings(s); }, 5000);
    })();
  </script>
</body>
</html>
