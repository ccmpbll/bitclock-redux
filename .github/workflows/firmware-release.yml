name: Firmware Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release (rev2-esp32s3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Inject version into firmware
        run: |
          sed -i 's/#define BITCLOCK_FW_VERSION ".*"/#define BITCLOCK_FW_VERSION "${{ steps.version.outputs.VERSION }}"/' \
            bitclock-fw/target-rev2-esp32s3/main/libs/version.h

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: esp32s3
          path: bitclock-fw/target-rev2-esp32s3

      - name: Prepare release binaries
        working-directory: bitclock-fw/target-rev2-esp32s3
        run: |
          pip install esptool
          V=${{ steps.version.outputs.VERSION }}
          # Full-flash image for first-time flashing over USB at offset 0x0
          esptool.py --chip esp32s3 merge_bin \
            --output ${{ runner.temp }}/bitclock-redux-full-$V.bin \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/bitclock.bin
          # App-only image for OTA updates via the web admin
          cp build/bitclock.bin ${{ runner.temp }}/bitclock-redux-app-$V.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            **`bitclock-redux-full-${{ steps.version.outputs.VERSION }}.bin`** — full-flash image. Flash over USB at offset `0x0` (esptool / web flasher) for a first-time install.

            **`bitclock-redux-app-${{ steps.version.outputs.VERSION }}.bin`** — app-only image. Upload via the web admin (`http://bitclock.local`) to update an already-running device over the air.
          files: |
            ${{ runner.temp }}/bitclock-redux-full-${{ steps.version.outputs.VERSION }}.bin
            ${{ runner.temp }}/bitclock-redux-app-${{ steps.version.outputs.VERSION }}.bin
