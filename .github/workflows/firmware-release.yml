name: Firmware Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release (rev2-esp32s3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Inject version into firmware
        run: |
          sed -i 's/static const char \*gatt_svr_chr_firmware_version_val = ".*";/static const char *gatt_svr_chr_firmware_version_val = "${{ steps.version.outputs.VERSION }}";/' \
            bitclock-fw/target-rev2-esp32s3/main/libs/gatt.c

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: esp32s3
          path: bitclock-fw/target-rev2-esp32s3

      - name: Merge binaries
        working-directory: bitclock-fw/target-rev2-esp32s3
        run: |
          pip install esptool
          esptool.py --chip esp32s3 merge_bin \
            --output build/bitclock-${{ steps.version.outputs.VERSION }}.bin \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/bitclock.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: bitclock-fw/target-rev2-esp32s3/build/bitclock-${{ steps.version.outputs.VERSION }}.bin
